name: "Dockerize and push to Infra-Repo"
description: "Dockerize application and push Kubernetes-files to Infra-Repo"
author: "fantasyflip"

inputs:
  node-version:
    required: false
    default: "18"
    description: "Deprecated — no longer used. Kept for backward compatibility with existing workflows."
  infra-repo:
    required: true
    description: "Repository to push Kubernetes-files to"
  source-repo:
    default: ${{ github.repository }}
    required: false
    description: "Repository to pull application from"
  gh-token:
    required: true
    description: "GitHub Token for pushing and pulling to/from Infra-Repo"
  gh-username:
    required: false
    description: "GitHub Username for pushing and pulling to/from Infra-Repo"
    default: ${{ github.actor }}
  gh-email:
    required: true
    description: "GitHub Email for pushing and pulling to/from Infra-Repo"
  source-branch:
    default: "main"
    required: false
    description: "Branch to pull application from"
  infra-branch:
    default: "main"
    required: false
    description: "Branch to pull infra repository from"
  namespace:
    required: true
    description: "Namespace for Kubernetes-files"
  app-name:
    required: true
    description: "Name of the application for the Infra-Repo"
  deployment-path:
    default: "deployment"
    required: false
    description: "Path to the deployment files in the source repository"

runs:
  using: "composite"
  steps:
    # Sub-actions resolve from the job workspace, not the downloaded action
    # package — checkout ensures ./actions/* paths work when consumed remotely.
    - name: Checkout action repository
      uses: actions/checkout@v4
      with:
        repository: fantasyflip/k8s-build-transfer
        ref: ${{ github.action_ref }}
        token: ${{ inputs.gh-token }}
        fetch-depth: 1

    - name: Checkout source repository
      if: inputs.source-repo
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.source-repo }}
        token: ${{ inputs.gh-token }}
        path: source
        ref: ${{ inputs.source-branch }}
        fetch-depth: 1

    - name: Checkout this repo as source
      if: ${{ !inputs.source-repo }}
      uses: actions/checkout@v4
      with:
        path: source
        ref: ${{ inputs.source-branch }}
        fetch-depth: 1

    - name: Checkout infra code
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.infra-repo }}
        token: ${{ inputs.gh-token }}
        path: infra
        ref: ${{ inputs.infra-branch }}
        fetch-depth: 1

    - name: Generate Image URL
      uses: ./actions/generateImageUrl/
      with:
        repo-name: ${{ inputs.source-repo }}
        branch-name: ${{ inputs.source-branch || 'main' }}
        sha: ${{ github.sha }}

    - name: Set up QEMU
      if: runner.arch != 'ARM64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      shell: bash
      run: echo "${{ inputs.gh-token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Start Docker build in background
      shell: bash
      run: |
        # Build and push in the background so ingress work can run in parallel
        docker buildx build \
          --file source/Dockerfile \
          --push \
          --platform linux/arm64 \
          --tag "${RT_IMG_URL}" \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          source > /tmp/docker-build.log 2>&1 &
        echo $! > /tmp/docker-build.pid

    - name: Check ingress in infra repo
      uses: ./actions/checkIngress/
      with:
        namespace: ${{ inputs.namespace }}
        deployment-path: ${{ inputs.deployment-path }}

    - name: Check if Ingress files are identical
      if: env.RT_INGRESS_EXISTS == 'true'
      uses: ./actions/checkIngressDiff/
      with:
        namespace: ${{ inputs.namespace }}
        deployment-path: ${{ inputs.deployment-path }}

    - name: Merge Ingress ruleset
      if: env.RT_INGRESS_EXISTS == 'true' && env.RT_INGRESS_IDENTICAL == 'false'
      uses: ./actions/mergeIngress/
      with:
        namespace: ${{ inputs.namespace }}
        deployment-path: ${{ inputs.deployment-path }}

    - name: Check if ingress changes were made
      if: env.RT_INGRESS_EXISTS == 'true' && env.RT_INGRESS_IDENTICAL == 'false'
      shell: bash
      run: |
        # Track whether mergeIngress produced a diff worth committing
        if git diff --quiet namespace/${{ inputs.namespace }}/ingress.json; then
          echo "No changes made to ingress.json"
          echo "RT_CHANGES_MADE=false" >> $GITHUB_ENV
        else
          echo "Changes made to ingress.json"
          echo "RT_CHANGES_MADE=true" >> $GITHUB_ENV
        fi
      working-directory: infra

    - name: Generate ingress commit message
      if: env.RT_CHANGES_MADE == 'true' || env.RT_INGRESS_EXISTS == 'false'
      uses: ./actions/generateCommitMessage/
      with:
        repo-name: ${{ inputs.source-repo }}
        namespace: ${{ inputs.namespace }}
        app-name: ${{ inputs.app-name }}

    - name: Wait for Docker build
      shell: bash
      run: |
        # Block until the background build finishes before patching deployment manifests
        if wait "$(cat /tmp/docker-build.pid)"; then
          echo "Docker build succeeded"
        else
          echo "::error::Docker build failed"
          tail -n 200 /tmp/docker-build.log
          exit 1
        fi

    - name: Update k8s deployment image
      uses: ./actions/updateImageUrl/
      with:
        image-url: ${{ env.RT_IMG_URL }}
        deployment-file: source/${{ inputs.deployment-path }}/pod/deployment.json

    - name: Copy pod manifests and push infra changes
      shell: bash
      run: |
        POD_DEST="namespace/${{ inputs.namespace }}/${{ inputs.app-name }}"
        INGRESS_PATH="namespace/${{ inputs.namespace }}/ingress.json"

        # Copy pod manifests into the already-checked-out infra tree
        mkdir -p "infra/${POD_DEST}"
        cp -a "source/${{ inputs.deployment-path }}/pod/." "infra/${POD_DEST}/"

        cd infra
        git config user.name "${{ inputs.gh-username }}"
        git config user.email "${{ inputs.gh-email }}"

        git add "${POD_DEST}"

        # Stage ingress when it was newly added or merged
        if [ "${RT_INGRESS_EXISTS}" = "false" ] || [ "${RT_CHANGES_MADE}" = "true" ]; then
          git add "${INGRESS_PATH}"
        fi

        # Skip push when pod and ingress are both unchanged
        if git diff --staged --quiet; then
          echo "No infra changes to commit"
          exit 0
        fi

        # Prefer ingress commit message when ingress changed; otherwise pod-only message
        if { [ "${RT_INGRESS_EXISTS}" = "false" ] || [ "${RT_CHANGES_MADE}" = "true" ]; } && [ -n "${RT_COM_MSG}" ]; then
          COMMIT_MSG="${RT_COM_MSG}"
        else
          COMMIT_MSG="chore(k8s): Copy pod ${{ inputs.app-name }} from ${{ inputs.source-repo }} to namespace ${{ inputs.namespace }} [CI][N=${{ inputs.namespace }}]"
        fi

        git commit -m "${COMMIT_MSG}"
        git push origin "${{ inputs.infra-branch }}"
      env:
        GITHUB_TOKEN: ${{ inputs.gh-token }}
        RT_INGRESS_EXISTS: ${{ env.RT_INGRESS_EXISTS }}
        RT_CHANGES_MADE: ${{ env.RT_CHANGES_MADE }}
        RT_COM_MSG: ${{ env.RT_COM_MSG }}

    - name: Commit and push deployment changes to source repository
      shell: bash
      run: |
        cd source
        git config user.email "${{ inputs.gh-email }}"
        git config user.name "${{ inputs.gh-username }}"
        git add ${{ inputs.deployment-path }}/pod/deployment.json
        if git diff-index --quiet HEAD; then
          echo "Warning: No changes to commit"
        else
          git commit -m "chore(k8s): update deployment info [skip ci]"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ inputs.gh-token }}
